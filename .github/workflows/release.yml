name: Release
on:
  push:
    branches:
      - main # Change this to your main release branch (e.g., master, release)

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      issues: write
      pull-requests: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          # This is important for fetching the full commit history and tags
          # which is required by semantic-release to determine the correct version.
          fetch-depth: 0 
          persist-credentials: false # Recommended for protected branches

      - name: Semantic Release
        uses: cycjimmy/semantic-release-action@v4 # Use the specific action
        with:
          extra_plugins: |
            conventional-changelog-conventionalcommits
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Update CHANGELOG.md
        run: |
          npm install --no-save conventional-changelog-cli conventional-changelog-conventionalcommits
          npx conventional-changelog -p conventionalcommits -i CHANGELOG.md -s

      - name: Create Changelog PR
        uses: peter-evans/create-pull-request@v7
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          commit-message: "docs(changelog): update CHANGELOG.md"
          branch: "chore/changelog-update-${{ github.run_id }}"
          title: "docs(changelog): update CHANGELOG.md"
          body: |
            Automated changelog refresh generated by the release workflow.
          add-paths: |
            CHANGELOG.md
          labels: |
            documentation
            release